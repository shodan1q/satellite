      // the model move in lock-step. Moving only the target (as before)
      // would change the camera-to-model distance, which reads on
      // screen as an unwanted zoom while the user drags.
      state.orbitTarget.x += dx;
      state.orbitTarget.y += dy;
      state.orbitTarget.z += dz;
      anchor.position.x += dx;
      anchor.position.z += dz;
      // Deliberately skip anchor.y — it's owned by rebuild() /
      // frameLoadedModel so the model stays vertically centered.
    },
    // ---------- analog navigation (left/right joysticks + up/down) -----
    // Step sizes are sized for ~30 Hz call rate driven by JoystickPad
    // tick timer. WALK/CLIMB use scene-meters per tick; LOOK uses
    // degrees per tick. Tuned so a fully-deflected joystick traverses
    // the ISS scene (~13 world units across at our scale) in ~5 s and
    // a 360° spin in ~2 s, which feels responsive without overshooting.
    walkMove(forward, right) {
      const STEP = 0.05;
      // Camera's facing direction projected to the XZ plane. Mode-agnostic:
      // works under both touch (orbit) and motion modes because we read
      // camera.matrixWorld which both modes update.
      const fwd = new THREE.Vector3();
      camera.getWorldDirection(fwd);
      fwd.y = 0;
      if (fwd.lengthSq() < 1e-6) return;
      fwd.normalize();
      // Right-hand perpendicular on the XZ plane.
      const rt = new THREE.Vector3(-fwd.z, 0, fwd.x);
      const dx = (fwd.x * forward + rt.x * right) * STEP;
      const dz = (fwd.z * forward + rt.z * right) * STEP;
      // Only move the orbit target — the camera follows. Crucially we
      // do NOT translate `anchor` (unlike panTarget): in env-on mode the
      // splat scene is parented to anchor, and moving anchor along with
      // the camera would cancel out the relative motion (the user would
      // see no movement at all). Keeping anchor fixed means the camera
      // truly walks through the static scene.
      state.orbitTarget.x += dx;
      state.orbitTarget.z += dz;
    },
    walkClimb(up) {
      const STEP = 0.04;
      state.orbitTarget.y += up * STEP;
      // Don't touch anchor.y — owned by rebuild() / frameLoadedModel.
    },
    lookBy(yawNorm, pitchNorm) {
      // Map joystick deflection to per-tick rotation. ~3°/tick at full
      // deflection × 30 Hz ≈ 90°/s, comfortable for browsing the ISS.
      const STEP_DEG = 3.0;
      state.orbitYaw += THREE.MathUtils.degToRad(yawNorm * STEP_DEG);
      const nextPitch = state.orbitPitch +
        THREE.MathUtils.degToRad(pitchNorm * STEP_DEG);
      state.orbitPitch = Math.max(-1.2, Math.min(1.2, nextPitch));
    },
    // Toggle the workshop backdrop. When ON the WebView renders a
    // fully opaque scene behind the model:
    //   1. Try the Gaussian-splat "blacksmith forge" scene (real capture)
    //   2. If the fetch fails / hasn't finished, render the procedural
    //      sci-fi maker lab while we wait so the user isn't staring
    //      at a blank void
    // When OFF the canvas clears transparent again so the native camera
    // preview shows through (classic AR passthrough mode).
    setEnvironment(on) {
      envDesiredOn = !!on;
      console.log('[env] setEnvironment(' + on + ') splatReady=' + splatReady +
        ' splatViewer=' + !!splatViewer);
      // Hide the foreground rocket/satellite model whenever the splat
      // backdrop is on — the user wants an unobstructed view of the ISS
      // capture, with the satellite stepping out of the frame. Goes
      // back to visible the moment env toggles off.
      // Belt-and-suspenders: flip .visible AND detach from the anchor.
      // Just .visible was leaking the procedural satellite through on at
      // least one device — possibly a stale cached ar.html or a render
      // pass that re-traversed children. Removing the group from the
      // scene graph guarantees the meshes can't be drawn.
      rocket.visible = !on;
      if (on) {
        if (rocket.parent === anchor) anchor.remove(rocket);
      } else {
        if (rocket.parent !== anchor) anchor.add(rocket);
      }
      if (on) {
        renderer.setClearColor(0x000000, 1);
        // Show the procedural lab immediately — it stays up until the
        // splat finishes parsing, then gets hidden. If the splat
        // already loaded (user toggling off/on), skip straight to it.
        envGroup.visible = !splatReady;
        if (splatViewer) splatViewer.visible = true;
        ensureSplatLoaded().then(() => {
          console.log('[env] ensureSplatLoaded .then() fired — splatReady=' +
            splatReady + ' envDesiredOn=' + envDesiredOn);
          // Honor the most recent user toggle — they may have turned
          // env off while the splat was still parsing.
          if (splatReady) {
            envGroup.visible = false;
            if (splatViewer) splatViewer.visible = envDesiredOn;
            console.log('[env] after hide envGroup: envGroup.visible=' +
              envGroup.visible + ' splatViewer.visible=' + splatViewer.visible);
          }
        }).catch((err) => {
          console.error('[env] ensureSplatLoaded .then() rejected: ' +
            (err && err.message ? err.message : err));
        });
      } else {
        renderer.setClearColor(0x000000, 0);
        envGroup.visible = false;
        if (splatViewer) splatViewer.visible = false;
      }
    }
  };

  setTimeout(() => notify('ready', true), 80);
})();
</script>
</body>
</html>
